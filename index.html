<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频创作者作品集</title>
    <meta
      name="description"
      content="视频创作者面试作品集：后期制作、摄影、灯光与美术方向的精选项目。"
    />
    <meta name="author" content="你的姓名" />
    <meta name="keywords" content="视频作品集, 后期制作, Vlog, 调色, 摄影, 灯光, 美术" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="视频创作者作品集" />
    <meta
      property="og:description"
      content="视频创作者面试作品集：后期制作、摄影、灯光与美术方向的精选项目。"
    />
    <meta property="og:image" content="assets/hero-portfolio.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://litu03140-sys.github.io/video-portfolio/" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="assets/hero-portfolio.png" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json" id="structured-data">{}</script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top">
        <span class="brand-mark" aria-hidden="true"></span>
        <span id="site-brand"></span>
      </a>
      <nav class="nav-links" id="site-nav" aria-label="主导航"></nav>
    </header>

    <main id="top">
      <section class="first-screen" aria-labelledby="hero-title">
        <img class="hero-image" id="hero-image" src="assets/hero-portfolio.png" alt="" />
        <div class="hero-scrim" aria-hidden="true"></div>

        <div class="first-grid">
          <div class="intro-column">
            <section class="profile-panel" aria-label="个人信息">
              <div class="profile-head">
                <img class="profile-photo" id="profile-photo" src="assets/profile-kong-zijie.jpg" alt="" />
                <div>
                  <p class="eyebrow" id="hero-eyebrow"></p>
                  <h1 id="hero-title"></h1>
                  <p class="hero-role" id="hero-role"></p>
                </div>
              </div>
              <p class="hero-copy" id="hero-copy"></p>
              <dl class="profile-facts" id="profile-facts"></dl>
              <div class="profile-tags" id="profile-tags"></div>
              <div class="hero-actions" id="hero-actions"></div>
            </section>

            <section class="category-strip" id="category-strip" aria-label="作品分类入口"></section>
          </div>

          <section class="showcase-panel" aria-labelledby="showcase-title">
            <div class="panel-heading">
              <div>
                <p class="eyebrow" id="showcase-eyebrow"></p>
                <h2 id="showcase-title"></h2>
              </div>
              <p id="showcase-note"></p>
            </div>
            <div class="spotlight-grid" id="spotlight-grid"></div>
          </section>
        </div>
      </section>

      <section id="works" class="section-wrap" aria-labelledby="works-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="works-eyebrow"></p>
            <h2 id="works-title"></h2>
          </div>
          <p id="works-note"></p>
        </div>
        <div class="project-grid" id="project-grid"></div>
      </section>

      <section id="about" class="about section-wrap" aria-labelledby="about-title">
        <div>
          <p class="eyebrow" id="about-eyebrow"></p>
          <h2 id="about-title"></h2>
        </div>
        <div class="about-copy" id="about-copy"></div>
      </section>
    </main>

    <dialog class="project-dialog" id="project-dialog" aria-labelledby="dialog-title">
      <button class="dialog-close" id="dialog-close" type="button" aria-label="关闭">×</button>
      <div class="dialog-media" id="dialog-media"></div>
      <div class="dialog-body">
        <p class="eyebrow" id="dialog-category"></p>
        <h2 id="dialog-title"></h2>
        <p id="dialog-description"></p>
        <dl class="detail-list">
          <div>
            <dt id="dialog-role-label"></dt>
            <dd id="dialog-role"></dd>
          </div>
          <div>
            <dt id="dialog-focus-label"></dt>
            <dd id="dialog-focus"></dd>
          </div>
          <div>
            <dt id="dialog-output-label"></dt>
            <dd id="dialog-output"></dd>
          </div>
        </dl>
        <div class="dialog-actions" id="dialog-actions"></div>
      </div>
    </dialog>

    <script src="content.js"></script>
    <script src="script.js"></script>
  </body>
</html>
