<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>经历与能力 | 孔子杰作品集</title>
    <meta
      name="description"
      content="孔子杰的个人优势、专业技能、影视项目、赛事统筹与导播运营经历。"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://litu03140-sys.github.io/video-portfolio/experience.html" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="experience-page">
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span id="experience-brand"></span>
      </a>
      <nav class="nav-links" aria-label="经历页面导航">
        <a href="index.html">作品集首页</a>
        <a href="#skills">专业技能</a>
        <a href="#experience-groups">经历分类</a>
        <a href="#awards">荣誉课程</a>
      </nav>
    </header>

    <main class="experience-main">
      <section class="experience-hero" aria-labelledby="experience-title">
        <div>
          <p class="eyebrow" id="experience-eyebrow"></p>
          <h1 id="experience-title"></h1>
          <p id="experience-copy"></p>
          <div class="hero-actions">
            <a class="button primary" href="#experience-groups">查看经历</a>
            <a class="button secondary" href="index.html#works">查看作品</a>
          </div>
        </div>
        <div class="experience-stats" id="experience-stats"></div>
      </section>

      <section class="experience-section" aria-labelledby="roles-title">
        <div class="experience-heading">
          <p class="eyebrow">Target</p>
          <h2 id="roles-title">期望方向</h2>
        </div>
        <div class="role-strip" id="role-strip"></div>
      </section>

      <section class="experience-section" aria-labelledby="strength-title">
        <div class="experience-heading">
          <p class="eyebrow">Strengths</p>
          <h2 id="strength-title">个人优势</h2>
        </div>
        <div class="strength-grid" id="strength-grid"></div>
      </section>

      <section id="skills" class="experience-section" aria-labelledby="skill-title">
        <div class="experience-heading">
          <p class="eyebrow">Skills</p>
          <h2 id="skill-title">专业技能</h2>
        </div>
        <div class="skill-grid" id="skill-grid"></div>
      </section>

      <section id="experience-groups" class="experience-section" aria-labelledby="timeline-title">
        <div class="experience-heading">
          <p class="eyebrow">Experience</p>
          <h2 id="timeline-title">经历分类</h2>
        </div>
        <div class="timeline-list" id="timeline-list"></div>
      </section>

      <section id="awards" class="experience-section split-section" aria-label="荣誉奖项与主修课程">
        <article>
          <p class="eyebrow">Awards</p>
          <h2>荣誉奖项</h2>
          <ul id="award-list"></ul>
        </article>
        <article>
          <p class="eyebrow">Courses</p>
          <h2>主修课程</h2>
          <ul id="course-list"></ul>
        </article>
      </section>
    </main>

    <script src="content.js"></script>
    <script src="experience.js"></script>
  </body>
</html>
